<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Календарь передержки животных</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐾</text></svg>">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 30px;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
            font-size: 2em;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .nav-buttons {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .nav-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s;
        }

        .nav-btn:hover {
            background: #5a6fd6;
            transform: scale(1.05);
        }

        .current-month {
            font-size: 1.5em;
            font-weight: bold;
            color: #333;
            min-width: 200px;
            text-align: center;
        }

        .earnings {
            font-size: 1.3em;
            font-weight: bold;
            color: #11998e;
            background: #f0f9f8;
            padding: 8px 16px;
            border-radius: 10px;
            border: 2px solid #11998e;
        }

        .add-btn {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: all 0.3s;
        }

        .add-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(17, 153, 142, 0.4);
        }

        .weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 5px;
            margin-bottom: 10px;
        }

        .weekday {
            text-align: center;
            font-weight: bold;
            color: #666;
            padding: 10px;
            background: #f0f0f0;
            border-radius: 8px;
        }

        .calendar {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 5px;
        }

        .day {
            min-height: 100px;
            border: 1px solid #e0e0e0;
            border-radius: 10px;
            padding: 8px;
            background: #fafafa;
            position: relative;
            overflow: hidden;
            transition: all 0.3s;
        }

        .day:hover {
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .day.other-month {
            background: #f5f5f5;
            color: #aaa;
        }

        .day.today {
            border: 2px solid #667eea;
            background: #f0f4ff;
        }

        .day-number {
            font-weight: bold;
            font-size: 14px;
            margin-bottom: 5px;
        }

        .bookings-container {
            display: flex;
            flex-direction: column;
            gap: 3px;
            margin-top: 5px;
        }

        .booking-line {
            padding: 3px 6px;
            border-radius: 4px;
            font-size: 12px;
            color: #000000;
            font-weight: bold;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            cursor: pointer;
            transition: all 0.2s;
            text-shadow: none;
        }

        .booking-line:hover {
            transform: scale(1.02);
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }

        .booking-line.start {
            border-radius: 4px 0 0 4px;
            margin-right: -8px;
        }

        .booking-line.end {
            border-radius: 0 4px 4px 0;
            margin-left: -8px;
        }

        .booking-line.middle {
            border-radius: 0;
            margin-left: -8px;
            margin-right: -8px;
        }

        .booking-line.single {
            border-radius: 4px;
        }

        /* Модальное окно */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            visibility: hidden;
            transition: background 0.3s ease, visibility 0.3s ease;
        }

        .modal.active {
            visibility: visible;
            background: rgba(0,0,0,0.5);
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 20px;
            max-width: 700px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            transform: translateY(-30px);
            opacity: 0;
            transition: transform 0.3s ease, opacity 0.3s ease;
        }

        .modal.active .modal-content {
            transform: translateY(0);
            opacity: 1;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .modal-header h2 {
            color: #333;
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 28px;
            cursor: pointer;
            color: #999;
            transition: color 0.3s;
        }

        .close-btn:hover {
            color: #333;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #555;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        .color-picker-container {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .color-picker-container input[type="color"] {
            width: 60px;
            height: 45px;
            padding: 0;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }

        .color-presets {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .color-preset {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.3s;
        }

        .color-preset:hover {
            transform: scale(1.2);
        }

        .color-preset.selected {
            border-color: #333;
        }

        .submit-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        .submit-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        /* Детали бронирования */
        .booking-details {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #e0e0e0;
        }

        .delete-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #ff416c 0%, #ff4b2b 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .delete-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 5px 20px rgba(255, 65, 108, 0.4);
        }

        /* Легенда */
        .legend {
            margin-top: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 15px;
        }

        .legend h3 {
            margin-bottom: 15px;
            color: #333;
        }

        .legend-items {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 15px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            cursor: pointer;
            transition: all 0.3s;
        }

        .legend-item:hover {
            transform: scale(1.05);
        }

        .legend-color {
            width: 20px;
            height: 20px;
            border-radius: 4px;
        }

        .legend-text {
            font-size: 14px;
            color: #333;
        }

        .legend-dates {
            font-size: 12px;
            color: #666;
        }

        /* Стили для комментариев */
        .field-comment {
            font-size: 12px;
            color: #667eea;
            margin-top: 5px;
            font-weight: 500;
        }

        @media (max-width: 768px) {
            .day {
                min-height: 70px;
                padding: 5px;
            }

            .day-number {
                font-size: 12px;
            }

            .booking-line {
                font-size: 9px;
                padding: 2px 4px;
            }

            .weekday {
                font-size: 12px;
                padding: 5px;
            }

            .header {
                flex-direction: column;
            }

            .form-row {
                grid-template-columns: 1fr;
            }

            .legend h3 {
                margin-bottom: 15px;
                color: #333;
                display: flex;
                align-items: center;
                justify-content: space-between;
            }

            #archiveToggle {
                font-size: 14px;
                padding: 8px 15px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🐾 Календарь передержки животных</h1>
        
        <div class="header">
            <div class="nav-buttons">
                <button class="nav-btn" onclick="prevMonth()">← Назад</button>
                <span class="current-month" id="currentMonth"></span>
                <button class="nav-btn" onclick="nextMonth()">Вперёд →</button>
            </div>
            <div class="earnings">💰 <span id="monthEarnings">0</span> руб.</div>
            <button class="add-btn" onclick="openModal()">+ Добавить бронь</button>
        </div>

        <div class="weekdays">
            <div class="weekday">Пн</div>
            <div class="weekday">Вт</div>
            <div class="weekday">Ср</div>
            <div class="weekday">Чт</div>
            <div class="weekday">Пт</div>
            <div class="weekday">Сб</div>
            <div class="weekday">Вс</div>
        </div>

        <div class="calendar" id="calendar"></div>

        <div class="legend" id="legend">
            <h3>📋 Активные брони</h3>
            <div class="legend-items" id="legendItems"></div>
        </div>
    </div>

    <!-- Модальное окно добавления -->
    <div class="modal" id="addModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Новая бронь</h2>
                <button class="close-btn" onclick="closeModal()">&times;</button>
            </div>
            
            <form id="bookingForm" onsubmit="saveBooking(event)">
                <div class="form-row">
                    <div class="form-group">
                        <label>🐕 Имя животного</label>
                        <input type="text" id="petName" required placeholder="Например: Барсик">
                    </div>
                    
                    <div class="form-group">
                        <label>💰 Стоимость (руб.)</label>
                        <input type="number" id="price" placeholder="Например: 5000" min="0" oninput="updatePricePerDay()">
                        <div class="field-comment" id="pricePerDayComment"></div>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>📅 Дата заезда</label>
                        <input type="date" id="startDate" required onchange="updateDaysCount()">
                    </div>
                    
                    <div class="form-group">
                        <label>📅 Дата выезда</label>
                        <input type="date" id="endDate" required onchange="updateDaysCount()">
                        <div class="field-comment" id="daysCountComment"></div>
                    </div>
                </div>
                
                <div class="form-group">
                    <label>🎨 Цвет</label>
                    <div class="color-picker-container">
                        <input type="color" id="colorPicker" value="#667eea">
                        <div class="color-presets" id="colorPresets"></div>
                    </div>
                </div>

                <input type="hidden" id="editingId">
                
                <button type="submit" class="submit-btn">💾 Сохранить</button>
                
                <div class="booking-details" id="bookingDetails" style="display: none;">
                    <button type="button" class="delete-btn" onclick="deleteBooking()">🗑️ Удалить бронь</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // Состояние приложения
        let currentDate = new Date();
        let bookings = [];
        let showArchive = false;

        const API_URL = 'https://script.google.com/macros/s/AKfycbw1v-AYjjwrPt7wXY55r_-swIGhRH9yUSFjHhZjpxIez-tpqkok9Y4NY0mb-LlvkYq9Nw/exec';

        // Предустановленные цвета
        const presetColors = [
            '#667eea', '#764ba2', '#11998e', '#38ef7d',
            '#ff416c', '#ff4b2b', '#f093fb', '#f5576c',
            '#4facfe', '#00f2fe', '#43e97b', '#fa709a',
            '#fee140', '#fa709a', '#a8edea', '#fed6e3'
        ];

        // Названия месяцев
        const monthNames = [
            'Январь', 'Февраль', 'Март', 'Апрель', 'Май', 'Июнь',
            'Июль', 'Август', 'Сентябрь', 'Октябрь', 'Ноябрь', 'Декабрь'
        ];

        // Инициализация
        document.addEventListener('DOMContentLoaded', function() {
            loadBookings();
            renderCalendar();
            renderColorPresets();
            renderLegend();
        });

        // Функция подсчета количества дней
        function updateDaysCount() {
            const startDate = document.getElementById('startDate').value;
            const endDate = document.getElementById('endDate').value;
            const commentDiv = document.getElementById('daysCountComment');
            
            if (startDate && endDate) {
                const start = parseDate(startDate);
                const end = parseDate(endDate);
                
                if (end >= start) {
                    const days = Math.round((end - start) / (1000 * 60 * 60 * 24)) + 1;
                    commentDiv.textContent = `📊 Количество дней: ${days}`;
                    commentDiv.style.color = '#667eea';
                } else {
                    commentDiv.textContent = '⚠️ Дата выезда раньше даты заезда';
                    commentDiv.style.color = '#ff416c';
                }
            } else {
                commentDiv.textContent = '';
            }
            
            updatePricePerDay();
        }

        // Функция расчета цены за день
        function updatePricePerDay() {
            const startDate = document.getElementById('startDate').value;
            const endDate = document.getElementById('endDate').value;
            const price = document.getElementById('price').value;
            const commentDiv = document.getElementById('pricePerDayComment');
            
            if (startDate && endDate && price && price > 0) {
                const start = parseDate(startDate);
                const end = parseDate(endDate);
                
                if (end >= start) {
                    const days = Math.round((end - start) / (1000 * 60 * 60 * 24)) + 1;
                    const pricePerDay = (parseFloat(price) / days).toFixed(2);
                    commentDiv.textContent = `📊 Цена за день: ${pricePerDay} руб.`;
                    commentDiv.style.color = '#11998e';
                } else {
                    commentDiv.textContent = '';
                }
            } else {
                commentDiv.textContent = '';
            }
        }

        // Загрузка данных
        async function loadBookings() {
            try {
                const response = await fetch(API_URL);
                bookings = await response.json();
                renderCalendar();
                renderLegend();
            } catch (e) {
                console.error("Ошибка загрузки:", e);
                // Если база недоступна, берем из локальной памяти
                const saved = localStorage.getItem('petBookings');
                if (saved) bookings = JSON.parse(saved);
            }
        }

        // Сохранение данных в localStorage
        function saveBookingsToStorage() {
            localStorage.setItem('petBookings', JSON.stringify(bookings));
        }

        // Парсинг даты без проблем с часовыми поясами
        function parseDate(dateStr) {
            const [year, month, day] = dateStr.split('-').map(Number);
            return new Date(year, month - 1, day);
        }

        // Рендер календаря
        function renderCalendar() {
            const calendar = document.getElementById('calendar');
            const monthDisplay = document.getElementById('currentMonth');
            
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            
            monthDisplay.textContent = `${monthNames[month]} ${year}`;
            
            // Первый день месяца
            const firstDay = new Date(year, month, 1);
            // Последний день месяца
            const lastDay = new Date(year, month + 1, 0);
            
            // День недели первого дня (0 = воскресенье, нужно преобразовать в пн = 0)
            let startDay = firstDay.getDay() - 1;
            if (startDay < 0) startDay = 6;
            
            // Очищаем календарь
            calendar.innerHTML = '';
            
            // Дни предыдущего месяца
            const prevMonthLastDay = new Date(year, month, 0).getDate();
            for (let i = startDay - 1; i >= 0; i--) {
                const dayDiv = createDayElement(prevMonthLastDay - i, true, year, month - 1);
                calendar.appendChild(dayDiv);
            }
            
            // Дни текущего месяца
            const today = new Date();
            for (let day = 1; day <= lastDay.getDate(); day++) {
                const isToday = today.getDate() === day && 
                               today.getMonth() === month && 
                               today.getFullYear() === year;
                const dayDiv = createDayElement(day, false, year, month, isToday);
                calendar.appendChild(dayDiv);
            }
            
            // Дни следующего месяца
            const totalCells = calendar.children.length;
            const remainingCells = 42 - totalCells; // 6 недель * 7 дней
            for (let i = 1; i <= remainingCells; i++) {
                const dayDiv = createDayElement(i, true, year, month + 1);
                calendar.appendChild(dayDiv);
            }

            calculateMonthEarnings();
        }

        // Создание элемента дня
        function createDayElement(day, isOtherMonth, year, month, isToday = false) {
            const dayDiv = document.createElement('div');
            dayDiv.className = 'day';
            if (isOtherMonth) dayDiv.classList.add('other-month');
            if (isToday) dayDiv.classList.add('today');
            
            // Корректируем месяц и год
            if (month < 0) {
                month = 11;
                year--;
            } else if (month > 11) {
                month = 0;
                year++;
            }
            
            const dateStr = formatDate(year, month, day);
            const monthNum = String(month + 1).padStart(2, '0');
            
            dayDiv.innerHTML = `
                <div class="day-number">${day}.${monthNum}</div>
                <div class="bookings-container" id="bookings-${dateStr}"></div>
            `;
            
            // Добавляем бронирования для этого дня
            const dayBookings = getBookingsForDate(dateStr);
            const container = dayDiv.querySelector('.bookings-container');
            
            dayBookings.forEach(booking => {
                const line = document.createElement('div');
                line.className = 'booking-line';
                line.style.backgroundColor = booking.color;
                line.textContent = booking.petName;
                line.onclick = () => openEditModal(booking.id);
                
                // Определяем позицию в диапазоне
                const start = parseDate(booking.startDate);
                const end = parseDate(booking.endDate);
                const current = parseDate(dateStr);
                
                if (start.getTime() === end.getTime()) {
                    line.classList.add('single');
                } else if (current.getTime() === start.getTime()) {
                    line.classList.add('start');
                } else if (current.getTime() === end.getTime()) {
                    line.classList.add('end');
                } else {
                    line.classList.add('middle');
                }
                
                container.appendChild(line);
            });
            
            return dayDiv;
        }

        // Форматирование даты
        function formatDate(year, month, day) {
            return `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
        }

        // Получение бронирований для даты
        function getBookingsForDate(dateStr) {
            const date = parseDate(dateStr);
            return bookings.filter(booking => {
                const start = parseDate(booking.startDate);
                const end = parseDate(booking.endDate);
                return date >= start && date <= end;
            });
        }

        // Навигация по месяцам
        function prevMonth() {
            currentDate.setMonth(currentDate.getMonth() - 1);
            renderCalendar();
        }

        function nextMonth() {
            currentDate.setMonth(currentDate.getMonth() + 1);
            renderCalendar();
        }

        // Расчет заработка за текущий месяц
        function calculateMonthEarnings() {
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            
            const monthStart = new Date(year, month, 1);
            const monthEnd = new Date(year, month + 1, 0);
            
            let total = 0;
            
            bookings.forEach(booking => {
                const bookingStart = parseDate(booking.startDate);
                const bookingEnd = parseDate(booking.endDate);
                const price = parseFloat(booking.price) || 0;
                
                // Проверяем пересечение брони с текущим месяцем
                if (bookingEnd >= monthStart && bookingStart <= monthEnd) {
                    // Общее количество дней брони
                    const totalDays = Math.round((bookingEnd - bookingStart) / (1000 * 60 * 60 * 24)) + 1;
                    
                    // Дни в текущем месяце
                    const actualStart = bookingStart < monthStart ? monthStart : bookingStart;
                    const actualEnd = bookingEnd > monthEnd ? monthEnd : bookingEnd;
                    const daysInMonth = Math.round((actualEnd - actualStart) / (1000 * 60 * 60 * 24)) + 1;
                    
                    // Пропорциональная стоимость
                    if (totalDays > 0) {
                        total += (price / totalDays) * daysInMonth;
                    }
                }
            });
            
            document.getElementById('monthEarnings').textContent = Math.round(total);
        }

        // Рендер цветовых пресетов
        function renderColorPresets() {
            const container = document.getElementById('colorPresets');
            const colorPicker = document.getElementById('colorPicker');
            
            presetColors.forEach(color => {
                const preset = document.createElement('div');
                preset.className = 'color-preset';
                preset.style.backgroundColor = color;
                preset.onclick = () => {
                    colorPicker.value = color;
                    document.querySelectorAll('.color-preset').forEach(p => p.classList.remove('selected'));
                    preset.classList.add('selected');
                };
                container.appendChild(preset);
            });
        }

        // Открытие модального окна
        function openModal() {
            document.getElementById('addModal').classList.add('active');
            document.getElementById('modalTitle').textContent = 'Новая бронь';
            document.getElementById('bookingForm').reset();
            document.getElementById('editingId').value = '';
            document.getElementById('bookingDetails').style.display = 'none';
            document.getElementById('colorPicker').value = presetColors[Math.floor(Math.random() * presetColors.length)];
            document.getElementById('daysCountComment').textContent = '';
            document.getElementById('pricePerDayComment').textContent = '';
            
            // Устанавливаем минимальную дату
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('startDate').value = today;
            document.getElementById('endDate').value = today;
            updateDaysCount();
        }

        // Открытие модального окна для редактирования
        function openEditModal(id) {
            const booking = bookings.find(b => b.id === id);
            if (!booking) return;
            
            document.getElementById('addModal').classList.add('active');
            document.getElementById('modalTitle').textContent = 'Редактировать бронь';
            document.getElementById('petName').value = booking.petName;
            document.getElementById('startDate').value = booking.startDate;
            document.getElementById('endDate').value = booking.endDate;
            document.getElementById('colorPicker').value = booking.color;
            document.getElementById('price').value = booking.price || '';
            document.getElementById('editingId').value = id;
            document.getElementById('bookingDetails').style.display = 'block';
            updateDaysCount();
        }

        // Закрытие модального окна
        function closeModal() {
            document.getElementById('addModal').classList.remove('active');
        }

        // Сохранение бронирования
        async function saveBooking(event) {
            event.preventDefault();
            
            const petName = document.getElementById('petName').value.trim();
            const startDate = document.getElementById('startDate').value;
            const endDate = document.getElementById('endDate').value;
            const color = document.getElementById('colorPicker').value;
            const price = document.getElementById('price').value || 0;
            const editingId = document.getElementById('editingId').value;
            
            const bookingData = {
                id: editingId || Date.now().toString(),
                petName, startDate, endDate, color, price
            };

            // Оптимистичное обновление интерфейса
            if (editingId) {
                const index = bookings.findIndex(b => b.id === editingId);
                bookings[index] = bookingData;
            } else {
                bookings.push(bookingData);
            }
            
            renderCalendar();
            renderLegend();
            closeModal();

            // Отправка в Google Таблицу
            await fetch(API_URL, {
                method: 'POST',
                body: JSON.stringify({ action: 'save', data: bookingData })
            });
        }

        // Удаление бронирования
        async function deleteBooking() {
            const editingId = document.getElementById('editingId').value;
            if (!editingId) return;
            
            if (confirm('Вы уверены, что хотите удалить эту бронь?')) {
                const bookingData = { id: editingId };
                
                bookings = bookings.filter(b => b.id !== editingId);
                renderCalendar();
                renderLegend();
                closeModal();

                await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'delete', data: bookingData })
                });
            }
        }


        // Обновленная функция renderLegend с возможностью показа архива
        function renderLegend() {
            const container = document.getElementById('legendItems');
            const legendSection = document.getElementById('legend');
            
            // Добавляем кнопку переключения архива (если еще не добавлена)
            if (!document.getElementById('archiveToggle')) {
                const toggleBtn = document.createElement('button');
                toggleBtn.id = 'archiveToggle';
                toggleBtn.className = 'nav-btn';
                toggleBtn.style.marginLeft = '10px';
                toggleBtn.textContent = '📦 Показать архив';
                toggleBtn.onclick = toggleArchive;
                legendSection.querySelector('h3').appendChild(toggleBtn);
            }
            
            container.innerHTML = '';
            
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            
            // Фильтруем брони в зависимости от режима просмотра
            let filteredBookings;
            if (showArchive) {
                // Показываем только архивные (завершенные)
                filteredBookings = bookings.filter(booking => {
                    const endDate = parseDate(booking.endDate);
                    endDate.setHours(0, 0, 0, 0);
                    return endDate < today;
                });
            } else {
                // Показываем только активные
                filteredBookings = bookings.filter(booking => {
                    const endDate = parseDate(booking.endDate);
                    endDate.setHours(0, 0, 0, 0);
                    return endDate >= today;
                });
            }
            
            // Сортируем по дате начала
            const sortedBookings = [...filteredBookings].sort((a, b) => 
                new Date(a.startDate) - new Date(b.startDate)
            );
            
            if (sortedBookings.length === 0) {
                const message = showArchive ? 'Нет архивных бронирований' : 'Нет активных бронирований';
                container.innerHTML = `<p style="color: #666;">${message}</p>`;
                return;
            }
            
            sortedBookings.forEach(booking => {
                const item = document.createElement('div');
                item.className = 'legend-item';
                item.onclick = () => openEditModal(booking.id);
                
                const startFormatted = formatDisplayDate(booking.startDate);
                const endFormatted = formatDisplayDate(booking.endDate);
                
                // Добавляем индикатор для архивных броней
                const archiveIndicator = showArchive ? '<span style="color: #999;">📦 </span>' : '';
                
                item.innerHTML = `
                    <div class="legend-color" style="background-color: ${booking.color}"></div>
                    <div>
                        <div class="legend-text">${archiveIndicator}${booking.petName}</div>
                        <div class="legend-dates">${startFormatted} — ${endFormatted}</div>
                        <div class="legend-dates">💰 ${booking.price || 0} руб.</div>
                    </div>
                `;
                
                container.appendChild(item);
            });
        }

        // Функция переключения между активными и архивными бронями
        function toggleArchive() {
            showArchive = !showArchive;
            const btn = document.getElementById('archiveToggle');
            btn.textContent = showArchive ? '📋 Показать активные' : '📦 Показать архив';
            renderLegend();
        }

        // Форматирование даты для отображения
        function formatDisplayDate(dateStr) {
            const date = parseDate(dateStr);
            return date.toLocaleDateString('ru-RU', {
                day: 'numeric',
                month: 'short'
            });
        }

        // Закрытие модального окна при клике вне его
        document.getElementById('addModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeModal();
            }
        });

        // Закрытие по Escape
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeModal();
            }
        });
    </script>
</body>
